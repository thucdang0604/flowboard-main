<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Flowboard Bridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      background: #14161c;
      color: #e6e8ec;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      line-height: 1.5;
      margin: 0;
      padding: 0;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 12px 12px 8px;
      border-bottom: 1px solid #23263a;
    }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: #e6e8ec;
    }

    .header-version {
      font-size: 11px;
      color: #6b7280;
    }

    .section {
      padding: 8px 12px;
      border-bottom: 1px solid #23263a;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-label {
      color: #6b7280;
      min-width: 52px;
      flex-shrink: 0;
    }

    .section-value {
      color: #e6e8ec;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .dot-connected { color: #6ee7b7; }
    .dot-running   { color: #f5b301; }
    .dot-offline   { color: #6b7280; }

    .error-value {
      color: #ef4444;
      font-size: 11px;
    }

    .actions {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    button {
      width: 100%;
      padding: 6px 10px;
      background: #23263a;
      color: #a0a8c0;
      border: 1px solid #2e3250;
      border-radius: 8px;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      transition: background 0.12s, color 0.12s;
    }

    button:hover {
      background: #2a2e4a;
      color: #e6e8ec;
    }

    button#btn-toggle.reconnect {
      color: #6ee7b7;
      border-color: #1e3a32;
    }

    button#btn-toggle.disconnect {
      color: #ef4444;
      border-color: #3a1e1e;
    }
  </style>
</head>
<body>
  <header>
    <span class="header-title">Flowboard Bridge</span>
    <span class="header-version">v0.0.2</span>
  </header>

  <div class="section">
    <span class="section-label">Status</span>
    <span class="section-value" id="status-dot">○ offline</span>
  </div>

  <div class="section">
    <span class="section-label">Token</span>
    <span class="section-value" id="token-row">none</span>
  </div>

  <div class="section">
    <span class="section-label">Requests</span>
    <span class="section-value" id="stats-row">0 · ✓ 0 · ✗ 0</span>
  </div>

  <div class="section" id="error-section" style="display:none">
    <span class="section-label">Error</span>
    <span class="section-value error-value" id="error-row"></span>
  </div>

  <div class="actions">
    <button id="btn-flow-tab">Open Flow tab</button>
    <button id="btn-refresh">Refresh token</button>
    <button id="btn-toggle" class="disconnect">Disconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
